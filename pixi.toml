[workspace]
name = "mojo_programming"
version = "0.1.0"
channels = ["https://conda.modular.com/max/", "conda-forge"]
platforms = ["linux-64"]

[tasks]
run = "mojo codes/two_sum.mojo"
build-docs = "python scripts/build_docs.py && mkdocs build"

[dependencies]
mojo = "*"
python = ">=3.12"

[pypi-dependencies]
mkdocs-material = ">=9.0,<11"
pyyaml = ">=6.0"
