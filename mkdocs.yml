site_name: Mojo Programming
site_description: CPU & GPU algorithm implementations in the Mojo programming language
repo_url: https://github.com/ratulb/mojo_programming
repo_name: ratulb/mojo_programming
theme:
  name: material
  palette:
  - scheme: default
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
  - navigation.sections
  - navigation.expand
  - navigation.top
  - content.code.copy
extra_css:
- extra.css
markdown_extensions:
- attr_list
- md_in_html
- pymdownx.highlight
- pymdownx.superfences
- admonition
- pymdownx.details
- pymdownx.tabbed
plugins:
- search
nav:
- Home: index.md
- Arrays & Hashing:
  - Two Sum: codes/two_sum.md
  - 3Sum: codes/3sum.md
  - 4Sum: codes/4sum.md
  - Product Of Array Except Self: codes/product_of_array_except_self.md
  - Max Sum Sub Array: codes/max_sum_sub_array.md
  - Max Average Subarray: codes/max_average_subarray.md
  - Max Subarray Product: codes/max_subarray_product.md
  - Water Container Max Area: codes/water_container_max_area.md
  - Largest Number: codes/largest_number.md
  - Remove duplicates from sorted array: codes/remove_duplicates_sorted_arr.md
  - Merge nums2 into nums1 (in-place): codes/merge_shorted_arr_in_place.md
  - Sum 1D Tensor: codes/sum_1d_tensor.md
- Strings:
  - String to Integer (atoi): codes/atoi.md
  - Longest Substr No Char Repeats: codes/longest_substr_no_char_repeats.md
  - Longest Palindromic Substring: codes/longest_palidromic_substr.md
  - Interleaving String: codes/interleave_string.md
  - Last word length: codes/last_word_length.md
  - Find All Anagrams in a String: codes/all_anagrams.md
  - Word Search: codes/wordsearch.md
- Greedy & Two Pointers:
